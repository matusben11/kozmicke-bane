<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>KOZMICKE BANE v4.8</title>
<style>html,body{background:#000;}</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
:root{
  --a:#ffb000;--ad:#a07000;--ak:#3a2800;--ag:rgba(255,176,0,0.18);
  --r:#ff3a3a;--g:#39ff6a;--b:#38d1ff;--p:#cc66ff;
  --panel:#0b0900;--border:#ffb00033;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;font-family:'VT323',monospace;color:var(--a);overflow:hidden;user-select:none;}
#sf{position:fixed;inset:0;z-index:0;pointer-events:none;}
#crt{position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);
  animation:flicker .13s infinite;}
#crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 55%,rgba(0,0,0,.75) 100%);}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:.96}93%{opacity:.88}94%{opacity:.97}}
#scr{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:8px 0;}
#fl{position:fixed;inset:0;z-index:998;pointer-events:none;opacity:0;transition:opacity .11s;}
#topbar{position:fixed;top:6px;right:10px;z-index:1000;display:flex;gap:6px;}
.tbtn{background:transparent;border:1px solid var(--ad);color:var(--ad);font-family:'VT323',monospace;font-size:1rem;padding:1px 7px;cursor:pointer;transition:all .1s;}
.tbtn:hover{color:var(--a);border-color:var(--a);}
/* PANEL */
.panel{background:var(--panel);border:2px solid var(--a);
  box-shadow:0 0 35px var(--ag),inset 0 0 50px rgba(255,176,0,0.02);
  padding:1.4rem 1.9rem;min-width:730px;max-width:820px;position:relative;}
.panel::before{content:'';position:absolute;top:-1px;left:35px;right:35px;height:1px;
  background:linear-gradient(90deg,transparent,var(--a),transparent);}
.c{position:absolute;width:13px;height:13px;}
.c.tl{top:-1px;left:-1px;border-top:2px solid var(--a);border-left:2px solid var(--a);}
.c.tr{top:-1px;right:-1px;border-top:2px solid var(--a);border-right:2px solid var(--a);}
.c.bl{bottom:-1px;left:-1px;border-bottom:2px solid var(--a);border-left:2px solid var(--a);}
.c.br{bottom:-1px;right:-1px;border-bottom:2px solid var(--a);border-right:2px solid var(--a);}
/* ANIM */
.cursor-b{display:inline-block;width:9px;height:1.05em;background:var(--a);animation:blink .7s step-end infinite;vertical-align:text-bottom;margin-left:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pglow{0%,100%{text-shadow:0 0 9px var(--a)}50%{text-shadow:0 0 25px var(--a),0 0 50px var(--ad)}}
@keyframes sli{from{opacity:0;transform:translateX(-9px)}to{opacity:1;transform:translateX(0)}}
/* HUD */
#hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.22rem 1.2rem;font-size:1rem;
  border-bottom:1px solid var(--border);padding-bottom:.55rem;margin-bottom:.55rem;}
.hl{color:var(--ad);}
.bw{grid-column:1/-1;display:flex;align-items:center;gap:.45rem;font-size:.88rem;}
.bb{flex:1;height:11px;background:#180f00;border:1px solid var(--ad);overflow:hidden;}
.bf{height:100%;transition:width .45s ease;}
/* DEPTH BAR */
#dbar-wrap{grid-column:1/-1;display:flex;align-items:center;gap:.45rem;font-size:.88rem;}
#dbar-bg{flex:1;height:8px;background:#0d0d1a;border:1px solid #1a1a33;overflow:hidden;}
#dbar-fill{height:100%;background:linear-gradient(90deg,#1a1a88,#38d1ff);transition:width .5s ease;}
/* LOG */
#glog{height:148px;overflow-y:auto;font-size:.98rem;line-height:1.48;padding:.3rem .5rem;
  background:rgba(0,0,0,.38);border:1px solid var(--border);margin-bottom:.5rem;scroll-behavior:smooth;}
#glog::-webkit-scrollbar{width:4px;}
#glog::-webkit-scrollbar-thumb{background:var(--ad);}
.lok{color:var(--g);}.lwarn{color:var(--a);}.ldng{color:var(--r);}
.linf{color:var(--b);}.lrar{color:#ff69ff;text-shadow:0 0 5px #ff69ff;}
.lpol{color:#ffe066;text-shadow:0 0 5px #ffe066;}
.lev{color:#ff9944;}
.mf{animation:sli .18s ease;}
/* BUTTONS */
.mg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.32rem;margin-top:.38rem;}
.mg.g2{grid-template-columns:1fr 1fr;}
.mg.g1{grid-template-columns:1fr;}
.btn{background:#0d0a00;border:1px solid var(--ad);color:var(--a);font-family:'VT323',monospace;
  font-size:1.08rem;padding:.36rem .6rem;cursor:pointer;text-align:left;position:relative;overflow:hidden;transition:all .1s;}
.btn:hover{background:var(--ak);border-color:var(--a);color:#fff8e0;box-shadow:0 0 12px var(--ag);}
.btn:active{transform:scale(.98);}
.bk{color:var(--ad);margin-right:.38rem;}
.btn::after{content:'';position:absolute;left:-100%;top:0;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,176,0,.06),transparent);transition:left .28s;}
.btn:hover::after{left:150%;}
.btn-d{border-color:#ff3a3a33;color:var(--r);}
.btn-d:hover{background:#180000;border-color:var(--r);color:#ffaaaa;}
.btn-s{border-color:#39ff6a44;color:var(--g);}
.btn-s:hover{background:#001800;border-color:var(--g);color:#aaffcc;}
.btn-p{border-color:#ffe06644;color:#ffe066;}
.btn-p:hover{background:#1a1500;border-color:#ffe066;color:#fff5aa;}
.btn-b{border-color:#38d1ff44;color:var(--b);}
.btn-b:hover{background:#001520;border-color:var(--b);color:#aaeeff;}
.bbig{grid-column:1/-1;text-align:center;font-size:1.28rem;padding:.52rem;border-color:var(--a);}
/* MOBILE MODE */
body.kb-mobile .panel{min-width:98vw;max-width:98vw;padding:1rem 1.1rem;}
body.kb-mobile .btn{font-size:1.18rem;padding:.5rem .7rem;}
body.kb-mobile .bbig{font-size:1.45rem;padding:.7rem;}
body.kb-mobile #glog{height:170px;font-size:1.05rem;}
body.kb-mobile #hud{font-size:1.08rem;gap:.28rem .8rem;}
body.kb-mobile .mg{grid-template-columns:1fr 1fr;gap:.4rem;}
body.kb-mobile .mg.g1{grid-template-columns:1fr;}
body.kb-mobile .tbtn{font-size:1.1rem;padding:3px 10px;}
/* SECTION */
.st{font-size:1.12rem;color:var(--ad);letter-spacing:.09em;margin-bottom:.42rem;
  border-bottom:1px solid var(--border);padding-bottom:.2rem;}
/* SHOP */
.si{display:flex;justify-content:space-between;align-items:center;
  padding:.3rem .5rem;border:1px solid var(--border);margin-bottom:.2rem;cursor:pointer;transition:all .11s;}
.si:hover:not(.owned){background:var(--ak);border-color:var(--a);}
.si.owned{opacity:.4;cursor:default;}
/* POLISH */
.pi{display:flex;justify-content:space-between;align-items:center;
  padding:.25rem .5rem;border:1px solid var(--border);margin-bottom:.18rem;cursor:pointer;transition:all .11s;}
.pi:hover:not(.mt0){background:#1a1500;border-color:#ffe066;}
.pi.mt0{opacity:.28;cursor:default;}
.pg{font-size:.82rem;padding:1px 5px;border:1px solid currentColor;}
/* MINE PROG */
#mpw{width:100%;height:6px;background:#180f00;border:1px solid var(--ad);margin:.3rem 0;display:none;}
#mpf{height:100%;background:var(--a);width:0%;transition:width .05s;box-shadow:0 0 5px var(--a);}
/* PLANET LABEL */
#plabel{font-size:.84rem;color:var(--ad);text-align:center;letter-spacing:.13em;margin-bottom:.35rem;}
/* DEPTH INDICATOR */
#depth-badge{display:inline-block;padding:1px 8px;border:1px solid currentColor;font-size:.88rem;margin-left:.5rem;}
/* LEADERBOARD */
.lb-row{display:grid;grid-template-columns:2rem 1fr 1fr 1fr 1fr;gap:.2rem;padding:.2rem .4rem;font-size:1rem;border-bottom:1px solid var(--border);}
.lb-row.me{background:rgba(255,176,0,.08);color:#fff8e0;}
.lb-row.gold{color:#ffee00;}
.lb-row.silver{color:#cccccc;}
.lb-row.bronze{color:#cc8844;}
/* SAVE SLOT */
.slot{display:flex;justify-content:space-between;align-items:center;padding:.35rem .6rem;border:1px solid var(--border);margin-bottom:.25rem;cursor:pointer;transition:all .11s;}
.slot:hover{background:var(--ak);border-color:var(--a);}
.slot.empty{opacity:.5;}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--ad);}
/* END */
@keyframes fstar{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-55px) rotate(180deg);opacity:0}}
</style>
</head>

  <button class="tbtn" onclick="quickSave()" id="qsbtn" style="display:none">рҹ’ҫ SAVE</button>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  AUDIO
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let AC=null,sOn=true,ambG=null;
function ga(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function tSnd(){sOn=!sOn;document.getElementById('sbtn').textContent=sOn?'рҹ”Ҡ':'рҹ”Ү';if(ambG)ambG.gain.setTargetAtTime(sOn?.055:0,ga().currentTime,.15);}
function pt(f,t,d,v=.15,dl=0){if(!sOn)return;try{const a=ga(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.value=f;const T=a.currentTime+dl;g.gain.setValueAtTime(0,T);g.gain.linearRampToValueAtTime(v,T+.012);g.gain.exponentialRampToValueAtTime(.001,T+d);o.start(T);o.stop(T+d+.05);}catch(e){}}
function pn(d,v=.07,fc=600){if(!sOn)return;try{const a=ga(),b=a.createBuffer(1,a.sampleRate*d,a.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=(Math.random()*2-1)*.4;const s=a.createBufferSource(),g=a.createGain(),f=a.createBiquadFilter();f.type='bandpass';f.frequency.value=fc;f.Q.value=.5;s.buffer=b;s.connect(f);f.connect(g);g.connect(a.destination);g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);s.start();s.stop(a.currentTime+d+.05);}catch(e){}}
function sFX(t){
  if(t==='click'){pt(880,'square',.055,.09);}
  else if(t==='mine'){for(let i=0;i<6;i++){pn(.04,.1-i*.012,200+i*30);pt(100+i*12,'sawtooth',.07,.1,i*.08);}pt(75,'sine',.5,.065);}
  else if(t==='find'){pt(440,'sine',.11,.11);pt(554,'sine',.11,.09,.09);}
  else if(t==='rare'){[523,659,784,1047,1319].forEach((f,i)=>pt(f,'sine',.17,.2,i*.08));pt(1047,'triangle',.38,.13,.45);}
  else if(t==='buy'){[330,440,550,660].forEach((f,i)=>pt(f,'triangle',.14,.17,i*.07));}
  else if(t==='danger'){for(let i=0;i<3;i++){pt(220,'sawtooth',.11,.2,i*.17);pt(170,'square',.11,.17,i*.17+.06);}}
  else if(t==='polish'){pn(.55,.05,300);[880,1100,1320,1760].forEach((f,i)=>pt(f,'sine',.11,.16,.38+i*.08));pt(2093,'sine',.22,.13,.8);}
  else if(t==='save'){[440,554,659].forEach((f,i)=>pt(f,'sine',.15,.16,i*.08));}
  else if(t==='load'){[659,554,440,330].forEach((f,i)=>pt(f,'sine',.14,.15,i*.07));}
  else if(t==='win'){const n=[523,659,784,1047,784,1047,1319];n.forEach((f,i)=>pt(f,'triangle',.23,.2,i*.11));setTimeout(()=>[523,659,784,1047,1047].forEach((f,i)=>pt(f,'sine',.28,.18,i*.1)),850);}
  else if(t==='lose'){[400,320,260,200,160].forEach((f,i)=>pt(f,'sawtooth',.23,.18,i*.14));}
  else if(t==='depth'){pt(200,'sine',.4,.15);pt(150,'sine',.5,.1,.2);}
}
function startAmb(){if(!sOn)return;try{const a=ga();const o=a.createOscillator(),o2=a.createOscillator();ambG=a.createGain();o.type='sine';o.frequency.value=52;o2.type='sine';o2.frequency.value=55;o.connect(ambG);o2.connect(ambG);ambG.connect(a.destination);ambG.gain.value=0;ambG.gain.setTargetAtTime(.055,a.currentTime,2.5);o.start();o2.start();}catch(e){}}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  STARFIELD
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const SFC=document.getElementById('sf'),SFX=SFC.getContext('2d');let ST=[];
function iST(){SFC.width=window.innerWidth;SFC.height=window.innerHeight;ST=[];
  for(let i=0;i<300;i++)ST.push({x:Math.random()*SFC.width,y:Math.random()*SFC.height,
    r:Math.random()*1.4+.18,sp:Math.random()*.25+.03,tw:Math.random()*Math.PI*2,
    ts:Math.random()*.038+.01,c:Math.random()<.08?'#38d1ff':Math.random()<.06?'#ff9944':'#fffbe8'});}
function dST(){SFX.clearRect(0,0,SFC.width,SFC.height);
  ST.forEach(s=>{s.y+=s.sp;s.tw+=s.ts;if(s.y>SFC.height){s.y=0;s.x=Math.random()*SFC.width;}
    SFX.beginPath();SFX.arc(s.x,s.y,s.r,0,Math.PI*2);SFX.fillStyle=s.c;
    SFX.globalAlpha=.32+.65*Math.abs(Math.sin(s.tw));SFX.fill();});
  SFX.globalAlpha=1;requestAnimationFrame(dST);}
window.addEventListener('resize',iST);iST();dST();

const SCR=document.getElementById('scr'),FL=document.getElementById('fl');
function setScr(h){SCR.innerHTML=h;}
function flash(c='rgba(255,176,0,0.11)'){FL.style.background=c;FL.style.opacity='1';setTimeout(()=>FL.style.opacity='0',130);}
function corners(){return'<div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div>';}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  LANGUAGE

function t(key, vars={}) {
  let s = (T[LANG]||T.sk)[key] || T.sk[key] || key;
  for(const [k,v] of Object.entries(vars)) s = s.replaceAll('{'+k+'}', v);
  return s;
}

function toggleLang() {
  LANG = LANG === 'sk' ? 'en' : 'sk';
  localStorage.setItem('lang', LANG);
  const b = document.getElementById('lang-btn');
  if(b) b.textContent = LANG.toUpperCase();
  redrawCurrentView();
}

function redrawCurrentView() {
  // Determine which screen is currently showing and redraw it
  if(G && G.username) {
    rG([]);
  } else {
    sceneTitle(PILOT);
  }
}

const LS_KEY = 'kb_saves';
const LB_KEY = 'kb_leaderboard';

// DynamickГҪ getter вҖ” vyhodnocuje sa kaЕҫdГҪ raz keДҸ je volanГҪ,
// NIE pri ЕЎtarte (vtedy window.pywebview eЕЎte neexistuje)
function py(){
  if(window.pywebview && window.pywebview.api) return window.pywebview.api;
  if(window.pyapi) return window.pyapi;
  return null;
}

function getSaves(){
  try{
    const ls=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
    // Na novom zariadenГӯ: ak localStorage prГЎzdny ale server injektoval dГЎta, pouЕҫi ich
    if(!Object.keys(ls).length&&window.__SERVER_SAVES__&&Object.keys(window.__SERVER_SAVES__).length){
      localStorage.setItem(LS_KEY,JSON.stringify(window.__SERVER_SAVES__));
      return window.__SERVER_SAVES__;
    }
    return ls;
  }catch(e){return {};}
}
function getLB(){try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch(e){return[];}}

function saveGame(slot){
  const saves=getSaves();
  const data={
    v:3, slot, ts:Date.now(),
    username:G.username, hp:G.hp, maxHp:G.maxHp,
    credits:G.credits, turn:G.turn, goal:G.goal,
    depth:G.depth, depthM:G.depthM,
    inv:G.inv, upgrades:G.upgrades.map(u=>u.id),
    loreIdx:G.loreIdx, visited:Array.from(G.visited),
    stats:G.stats,
    rp:G.rp||0, weapon:G.weapon?G.weapon.id:null, rocket:G.rocket||0, planet:G.planet||1,
    era:G.era||1, colony:G.colony||null, currentPlanet4:G.currentPlanet4||'zyrax8',
    corpContract:G.corpContract||false, corpFee:G.corpFee||0, omegaUnlocked:G.omegaUnlocked||false,
  };
  saves[slot]=data;
  localStorage.setItem(LS_KEY,JSON.stringify(saves));
  const api=py(); if(api) api.save_game(slot, JSON.stringify(data));
}

function loadGame(slot){
  const saves=getSaves();const d=saves[slot];if(!d)return false;
  G={
    username:d.username, hp:d.hp, maxHp:d.maxHp,
    credits:d.credits, turn:d.turn, goal:d.goal||15000,
    depth:d.depth||1, depthM:d.depthM||0,
    inv:d.inv, upgrades:UPGRADES.filter(u=>d.upgrades.includes(u.id)),
    loreIdx:d.loreIdx||0, visited:new Set(d.visited||[]),
    stats:d.stats||{mined:0,sold:0,events:0,polished:0,maxDepth:1},
    rp:d.rp||0, weapon:WEAPONS.find(w=>w.id===d.weapon)||null, rocket:d.rocket||0, planet:d.planet||1,
    era:d.era||1, colony:d.colony||null, currentPlanet4:d.currentPlanet4||'zyrax8',
    corpContract:d.corpContract||false, corpFee:d.corpFee||0, omegaUnlocked:d.omegaUnlocked||false,
  };
  for(const m of MINERALS)if(!G.inv[m.id])G.inv[m.id]={qty:0,pl:0};
  for(const m of MINERALS_4)if(!G.inv[m.id])G.inv[m.id]={qty:0,pl:0};
  return true;
}

function deleteSlot(slot){
  const saves=getSaves();delete saves[slot];
  localStorage.setItem(LS_KEY,JSON.stringify(saves));
  const api=py(); if(api) api.delete_save(slot);
}

function addToLeaderboard(entry){
  const lb=getLB();
  lb.push(entry);
  lb.sort((a,b)=>b.score-a.score);
  const trimmed=lb.slice(0,20);
  localStorage.setItem(LB_KEY,JSON.stringify(trimmed));
  const api=py(); if(api) api.add_leaderboard(JSON.stringify(entry));
}

// ZavolГЎ sa pri konci session вҖ” zapГӯЕЎe kariГ©ru do kb_career.json cez Python
function reportSessionEnd(creditsEarned, mined, win){
  const api=py();
  if(api){
    try{
      api.report_session_end(creditsEarned, mined, win ? 1 : 0)
        .then(function(raw){
          try{
            const d=JSON.parse(raw||'{}');
            if(d&&d.career_cr>=0){
              // ZГЎloha kariГ©ry do localStorage вҖ” obnovГӯ sa pri vГҪpadku servera
              const prev=JSON.parse(localStorage.getItem('kb_career')||'{}');
              if(!prev.career_cr||d.career_cr>=prev.career_cr)
                localStorage.setItem('kb_career',JSON.stringify(d));
            }
          }catch(e){}
        }).catch(function(e){ console.warn('[KB] career save error:',e); });
    }catch(e){ console.warn('[KB] reportSessionEnd error:', e); }
  }
}

// NaДҚГӯtaj saves + leaderboard zo sГәborov na disku pri ЕЎtarte
function initDesktopData(){
  // PoДҚkaj kГҪm pywebview injektuje API (max 3s)
  let tries=0;
  function tryInit(){
    const api=py();
    if(api){
      api.get_startup_data().then(raw=>{
        try{
          const d=JSON.parse(raw);
          if(d.saves && Object.keys(d.saves).length)
            localStorage.setItem(LS_KEY, JSON.stringify(d.saves));
          if(d.leaderboard && d.leaderboard.length)
            localStorage.setItem(LB_KEY, JSON.stringify(d.leaderboard));
        }catch(e){ console.warn('[KB] initDesktopData parse error:', e); }
      });
    } else if(tries++ < 30){
      setTimeout(tryInit, 100);
    }
  }
  setTimeout(tryInit, 100);
}

function _buildLbRows(data){
  const medals=['рҹҘҮ','рҹҘҲ','рҹҘү'];
  const me=(G.username||PILOT).toUpperCase();
  if(!data||!data.length)return `<div style="text-align:center;color:var(--ad);padding:1rem">${t('lb_no_players')}</div>`;
  let rows=`<div class="lb-row" style="color:var(--ad);font-size:.88rem;border-bottom:1px solid var(--a);">
    <span>#</span><span>${t('lb_col_pilot')}</span><span>${t('lb_col_career')}</span><span>${t('lb_col_rank')}</span><span>${t('lb_col_sessions')}</span></div>`;
  data.forEach((e,i)=>{
    const medal=i<3?medals[i]:`${i+1}.`;
    const cls=(e.username.toUpperCase()===me?'lb-row me ':(i===0?'lb-row gold':i===1?'lb-row silver':i===2?'lb-row bronze':'lb-row'));
    rows+=`<div class="${cls}">
      <span>${medal}</span>
      <span><strong>${e.username}</strong></span>
      <span style="color:var(--a)">${(e.career_cr||0).toLocaleString()} CR</span>
      <span style="color:#ffdd44">${e.rank_name||'BanГӯk'}</span>
      <span>${t('lb_sessions',{s:e.sessions||0,w:e.wins||0})}</span>
    </div>`;
  });
  return rows;
}

function aLead(){
  const data=window.__GLOBAL_LB__||[];
  const rows=_buildLbRows(data);
  setScr(`<div class="panel" style="min-width:700px;max-height:92vh;overflow-y:auto;">
    ${corners()}
    <div class="st">${t('lb_title')}</div>
    <div id="lb-rows">${rows}</div>
    <div style="display:flex;gap:.4rem;margin-top:.7rem;">
      <button class="btn" style="flex:1;text-align:center;" onclick="sFX('click');${G.username?'rG([])':'sceneTitle(PILOT)'}">${t('back_big')}</button>
      <button class="btn btn-b" style="flex:0 0 auto;" onclick="sFX('click');_refreshLb()">${t('lb_refresh')}</button>
    </div>
  </div>`);
  document.onkeydown=e=>{if(e.key==='Escape'){sFX('click');G.username?rG([]):sceneTitle(PILOT);}};
  _refreshLb();
}

function _refreshLb(){
  const api=py();if(!api)return;
  api.get_leaderboard().then(raw=>{
    try{
      const data=JSON.parse(raw);
      if(data&&data.length){window.__GLOBAL_LB__=data;const el=document.getElementById('lb-rows');if(el)el.innerHTML=_buildLbRows(data);}
    }catch(e){}
  }).catch(()=>{});
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function invH(){return [...MINERALS,...(G.era===4?MINERALS_4:[])].map(m=>{const s=G.inv[m.id]||{qty:0,pl:0};
  if(!s.qty){const dim=m.tier>=5?'.45':'.2';return`<span style="color:${m.col};opacity:${dim}">${m.sym}0</span>`;}
  const pb=s.pl>0?`<sup style="color:#ffe066;font-size:.68rem">${s.pl>1?'вҳ…вҳ…':'вҳ…'}</sup>`:'';
  return`<span style="color:${m.col}">${m.sym}${s.qty}${pb}</span>`;}).join(' ');}
function upgB(){
  const parts=G.upgrades.map(u=>`<span style="color:var(--b);font-size:.82rem">${u.name.split(' ')[0]}</span>`);
  if(G.weapon)parts.push(`<span style="color:var(--r);font-size:.82rem">вҡ”${G.weapon.name.split(' ')[0]}</span>`);
  return parts.length?parts.join(' '):`<span style="opacity:.32">${t('equip_none')}</span>`;}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showGame(logs=[]){
  document.getElementById('qsbtn').style.display='inline-block';
  document.getElementById('lbbtn').style.display='inline-block';
  rG(logs);
}

function rG(logs=[]){
  const hp=G.hp,mh=G.maxHp;
  const hpP=Math.max(0,hp/mh*100);
  const gpP=Math.min(100,G.credits/G.goal*100);
  const dpP=Math.min(100,(G.depthM-(curDepthObj().minD))/(curDepthObj().maxD-curDepthObj().minD)*100||0);
  const hpC=hpP>55?'linear-gradient(90deg,#226600,#39ff6a)':hpP>28?'linear-gradient(90deg,#885500,#ffb000)':'linear-gradient(90deg,#880000,#ff3a3a)';
  const dep=curDepthObj();
  const hasPl=hasPol();
  const canGoDeeper=G.depth<5;
  const canGoUp=G.depth>1;

  const btns=[
    `<button class="btn" onclick="sFX('click');aMine()"><span class="bk">[1]</span>${t('btn_mine')}</button>`,
    `<button class="btn" onclick="sFX('click');aSell()"><span class="bk">[2]</span>${t('btn_sell')}</button>`,
    `<button class="btn" onclick="sFX('click');aShop()"><span class="bk">[3]</span>${t('btn_shop')}</button>`,
    hasPl?`<button class="btn btn-p" onclick="sFX('click');aPol()"><span class="bk">[4]</span>${t('btn_polish')}</button>`
         :`<button class="btn" onclick="sFX('click');aMap()"><span class="bk">[4]</span>${t('btn_map')}</button>`,
    hasPl?`<button class="btn" onclick="sFX('click');aMap()"><span class="bk">[5]</span>${t('btn_map')}</button>`
         :`<button class="btn" onclick="sFX('click');aLore()"><span class="bk">[5]</span>${t('btn_lore')}</button>`,
    hasPl?`<button class="btn" onclick="sFX('click');aLore()"><span class="bk">[6]</span>${t('btn_lore')}</button>`
         :`<button class="btn" onclick="sFX('click');aStat()"><span class="bk">[6]</span>${t('btn_stats')}</button>`,
    hasPl?`<button class="btn" onclick="sFX('click');aStat()"><span class="bk">[7]</span>${t('btn_stats')}</button>`:'',
    canGoDeeper?`<button class="btn" style="color:${DEPTHS[G.depth]?.col||'var(--b)'}" onclick="sFX('click');aDescend()"><span class="bk">[D]</span>${t('btn_descend')}</button>`:'<div></div>',
    canGoUp?`<button class="btn" onclick="sFX('click');aAscend()"><span class="bk">[U]</span>${t('btn_ascend')}</button>`:'<div></div>',
    `<button class="btn btn-s" onclick="sFX('click');sceneSave()"><span class="bk">[S]</span>${t('btn_save')}</button>`,
    `<button class="btn btn-b" onclick="sFX('click');aResearch()"><span class="bk">[R]</span>${t('btn_research')}</button>`,
    (G.rocket===1&&G.planet===1)?`<button class="btn" style="color:#ff88ff;border-color:#ff88ff44;grid-column:1/-1;text-align:center" onclick="sFX('click');aConfirmLaunch()"><span class="bk">[L]</span>${t('btn_rocket_launch')}</button>`:'',
    G.era===4?`<button class="btn btn-b" onclick="sFX('click');aColony()"><span class="bk">[C]</span>${t('btn_colony')}</button>`:'',
    G.era===4?`<button class="btn" style="color:#ff9944;border-color:#ff994444" onclick="sFX('click');aPlanetTravel()"><span class="bk">[P]</span>${t('btn_planets')}</button>`:'',
    G.era===4?`<button class="btn" style="color:#aaaaff;border-color:#aaaaff44" onclick="sFX('click');aCorpDashboard()"><span class="bk">[N]</span>${t('btn_corp')}</button>`:'',
    `<button class="btn btn-d" onclick="sFX('click');aQuit()">${t('btn_depart')}</button>`,
  ].filter(Boolean);

  const _plabel=G.era===4?curPlanet4().name:G.planet===3?t('planet_zyrax8_col'):G.planet===2?t('planet_zyrax10'):t('planet_zyrax9');
  const _pturnlabel=G.planet===3?`вҠ•${G.inv.titanium?.qty||0}/5 вҠ—${G.inv.exoternimium?.qty||0}/3`:G.era===4?t('hud_colony',{w:G.colony?.workers||0,f:G.colony?.food||0,e:G.colony?.energy||0}):`${t('hud_goal')}: ${G.goal} CR`;
  setScr(`<div class="panel" style="min-width:750px;max-width:830px;">
    ${corners()}
    <div id="plabel">в—Ҳ  ${_plabel}  v4.8  в—Ҳ  ${t('hud_turn')} ${G.turn}  в—Ҳ  ${_pturnlabel}  в—Ҳ</div>
    <div id="hud">
      <div><span class="hl">${t('hud_pilot')}</span> <strong>${G.username.toUpperCase()}</strong></div>
      <div><span class="hl">${t('hud_credits')}</span> <strong style="color:var(--a);text-shadow:0 0 7px var(--a)">${G.credits} CR</strong></div>
      <div><span class="hl">${t('hud_turn')}</span> ${G.turn} ${depthLabel()}</div>
      <div class="bw">
        <span class="hl" style="white-space:nowrap">${t('hud_hp')} ${hp}/${mh}</span>
        <div class="bb"><div class="bf" style="width:${hpP}%;background:${hpC}"></div></div>
      </div>
      ${G.planet===3?`
      <div class="bw" style="grid-column:1/-1">
        <span class="hl" style="white-space:nowrap;color:#99ddff">вҠ• Titanium</span>
        <div class="bb"><div class="bf" style="width:${Math.min(100,(G.inv.titanium?.qty||0)/5*100)}%;background:linear-gradient(90deg,#1a4488,#99ddff)"></div></div>
        <span style="color:#99ddff;font-size:.85rem;white-space:nowrap">${G.inv.titanium?.qty||0} / 5</span>
      </div>
      <div class="bw" style="grid-column:1/-1">
        <span class="hl" style="white-space:nowrap;color:#ff44aa">вҠ— Exoternimium</span>
        <div class="bb"><div class="bf" style="width:${Math.min(100,(G.inv.exoternimium?.qty||0)/3*100)}%;background:linear-gradient(90deg,#440022,#ff44aa)"></div></div>
        <span style="color:#ff44aa;font-size:.85rem;white-space:nowrap">${G.inv.exoternimium?.qty||0} / 3</span>
      </div>`:`
      <div class="bw" style="grid-column:1/-1">
        <span class="hl" style="white-space:nowrap">${t('hud_goal')}</span>
        <div class="bb"><div class="bf" style="width:${gpP}%;background:linear-gradient(90deg,var(--b),var(--g))"></div></div>
        <span style="color:var(--ad);font-size:.85rem;white-space:nowrap">${Math.round(gpP)}%  ${t('hud_missing',{n:Math.max(0,G.goal-G.credits)})}</span>
      </div>`}
      <div id="dbar-wrap">
        <span class="hl" style="white-space:nowrap;color:${dep.col}">${t('hud_depth',{n:G.depth})}</span>
        <div id="dbar-bg"><div id="dbar-fill" style="width:${Math.max(1,dpP)}%;background:linear-gradient(90deg,#1a1a88,${dep.col})"></div></div>
        <span style="color:${dep.col};font-size:.85rem;white-space:nowrap">${G.depthM}m</span>
      </div>
      <div style="grid-column:1/-1;font-size:.88rem"><span class="hl">${t('hud_inv')}</span> ${invH()}</div>
      <div style="grid-column:1/-1;font-size:.82rem"><span class="hl">${t('hud_equip')}</span> ${upgB()}</div>
      <div style="grid-column:1/-1;font-size:.82rem"><span class="hl">${t('hud_research')}</span> <span style="color:var(--b)">${G.rp} RP</span>${G.rocket===1&&G.planet===1?`  <span style="color:#ff88ff;animation:pglow 1s infinite">${t('hud_rocket_ready')}</span>`:''}</div>
    </div>
    <div id="mpw"><div id="mpf"></div></div>
    <div id="glog">${logs.map(e=>`<div class="${e.cls} mf">${e.txt}</div>`).join('')}<div id="le"></div></div>
    <div class="mg">${btns.join('')}</div>
  </div>`);
  const gl=document.getElementById('glog');if(gl)gl.scrollTop=gl.scrollHeight;

  const hasPl2=hasPol();
  document.onkeydown=e=>{const k=e.key.toLowerCase();
    if(k==='1')aMine();else if(k==='2')aSell();else if(k==='3')aShop();
    else if(k==='4'){if(hasPl2)aPol();else aMap();}
    else if(k==='5'){if(hasPl2)aMap();else aLore();}
    else if(k==='6'){if(hasPl2)aLore();else aStat();}
    else if(k==='7'&&hasPl2)aStat();
    else if(k==='d'&&G.depth<5)aDescend();
    else if(k==='u'&&G.depth>1)aAscend();
    else if(k==='r')aResearch();
    else if(k==='l'&&G.rocket===1&&G.planet===1)aConfirmLaunch();
    else if(k==='c'&&G.era===4)aColony();
    else if(k==='p'&&G.era===4)aPlanetTravel();
    else if(k==='n'&&G.era===4)aCorpDashboard();
    else if(k==='s')sceneSave();
    else if(k==='escape')aQuit();};}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  DEPTH ACTIONS
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function aDescend(){
  const nextDep=DEPTHS.find(d=>d.lv===G.depth+1);if(!nextDep)return;
  G.depth++;G.depthM=nextDep.minD+100;
  if(G.depth>G.stats.maxDepth)G.stats.maxDepth=G.depth;
  sFX('depth');flash(`${nextDep.col}22`);
  rG([{txt:t('depth_descend',{name:nextDep.name,n:G.depth,m:G.depthM}),cls:'linf'},
      {txt:t('depth_descend_warn'),cls:'lwarn'}]);}

function aAscend(){
  const prevDep=DEPTHS.find(d=>d.lv===G.depth-1);if(!prevDep)return;
  G.depth--;G.depthM=prevDep.maxD-100;
  sFX('click');
  rG([{txt:t('depth_ascend',{name:prevDep.name,n:G.depth,m:G.depthM}),cls:'linf'}]);}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  MINE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function aMine(){
  if(_miningLock){rG([{txt:t('mine_locked'),cls:'lwarn'}]);return;}
  // Era 4 bez zmluvy: ak sГә zГЎsoby vyДҚerpanГ©, ЕҘaЕҫba je zablokovanГЎ
  if(G.era===4&&G.colony&&!G.corpContract){
    const c=G.colony;
    if(c.food<=0&&c.energy<=0&&c.workers<=0){
      rG([{txt:t('mine_colony_collapsed'),cls:'ldng'},
          {txt:t('mine_colony_no_corp'),cls:'lwarn'},
          {txt:t('mine_colony_buy'),cls:'linf'},
          {txt:t('mine_colony_sign'),cls:'linf'}]);return;}}

  _miningLock=true;
  rG([{txt:t('mine_drilling'),cls:'linf'}]);
  const pw=document.getElementById('mpw'),pf=document.getElementById('mpf');
  if(pw)pw.style.display='block';sFX('mine');
  let p=0;function step(){p=Math.min(100,p+Math.random()*20+9);if(pf)pf.style.width=p+'%';
    if(p<100)setTimeout(step,50);else setTimeout(doMine,165);}setTimeout(step,55);}

function doMine(){
  const logs=[];G.turn++;
  G.depthM+=Math.floor(Math.random()*80+40);
  if(hU('reactor'))G.hp=Math.min(G.maxHp,G.hp+3);

  // в”Җв”Җ ERA 4: kolГіnia + korporГЎcia в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(G.era===4&&G.colony){
    const c=G.colony;
    // Corp poplatok
    if(G.corpContract&&G.corpFee>0){
      if(G.credits>=G.corpFee){G.credits-=G.corpFee;}
      else{logs.push({txt:t('mine_colony_fee_warn'),cls:'ldng'});G.corpContract=false;}}
    // Spotreba jedla
    const foodEat=c.workers;
    if(c.food>=foodEat){c.food-=foodEat;}
    else{c.workers=Math.max(0,c.workers-1);c.food=0;
      logs.push({txt:t('mine_food_depleted',{n:c.workers}),cls:'ldng'});}
    // Spotreba energie
    const engUse=Math.max(1,Math.floor(c.workers*.8));
    if(c.energy>=engUse){c.energy-=engUse;}
    else{c.energy=0;logs.push({txt:t('mine_energy_depleted'),cls:'lwarn'});}
    // MedicГӯna вҖ” pasГӯvna HP regen
    if(c.medicine>0){G.hp=Math.min(G.maxHp,G.hp+Math.floor(c.medicine/20));c.medicine=Math.max(0,c.medicine-1);}
    // Varovania pri nГӯzkych zГЎsobГЎch
    if(c.food<c.workers*2&&c.food>0)logs.push({txt:t('mine_food_low',{n:c.food}),cls:'lwarn'});
    if(c.energy<10)logs.push({txt:t('mine_energy_low',{n:c.energy}),cls:'lwarn'});
  }

  const dep=curDepthObj();
  const era4WorkerBonus=(G.era===4&&G.colony)?Math.min(5,Math.floor(G.colony.workers/2)):0;
  const era4EnergyOk=G.era<4||(G.colony&&G.colony.energy>0);
  const mb=mBonus()+(era4EnergyOk?era4WorkerBonus:0),hQ=hU('quantum'),hS=hU('scanner'),hC=hU('chrono'),hSon=hU('sonar');
  const sTypes=['Normal','Normal','Normal','Hot','Toxic','Rich','Deep','Frozen','Ancient'];
  const secPool=sTypes.filter(s=>s!=='Deep'||G.depth>=3);
  const sec=secPool[Math.floor(Math.random()*secPool.length)];
  if(hS)logs.push({txt:t('mine_scanner',{sec:t('sec_'+sec),m:G.depthM}),cls:'linf'});
  else logs.push({txt:t('mine_turn',{n:G.turn,sec:t('sec_'+sec),m:G.depthM}),cls:'linf'});

  // Era 4: pool minerГЎlov = MINERALS + MINERALS_4 (podДҫa planГ©ty)
  const p4=G.era===4?curPlanet4():null;
  const era4dmg=p4?p4.dmgMod:1;
  const activePool=G.era===4?[...MINERALS,...MINERALS_4]:MINERALS;
  const W=activePool.map((m,i)=>{
    let w=m.r;
    const tierMod=p4?p4.tierMod:0;
    const tierOK=m.tier<=(dep.lv+dep.tierBonus+tierMod);if(!tierOK)w*=.1;
    // Tier-5 iba na zyrax8(kolonizГЎcia) alebo 4.0 planГ©ty
    if(m.tier>=5&&G.planet!==3&&G.era<4)w=0;
    // PlanetГЎrne bonusy v 4.0
    if(G.era===4){
      if(m.tier>=5)w*=8; // tier-5 minerals: boost base chance in era 4
      if(m.id==='cryon'&&G.currentPlanet4==='kryon')w*=8;
      if(m.id==='volcanum'&&G.currentPlanet4==='sigma')w*=8;
      if(m.id==='neovoid'&&G.currentPlanet4==='omega7')w*=8;
      if(m.tier<5&&G.currentPlanet4==='zyrax8')w*=.3; // zГЎkladЕҲa вҖ” menej beЕҫnГҪch surovГӯn
    }
    if(hQ&&i>=5)w+=.04;if(hSon&&i>=8)w+=.05;
    if(sec==='Rich')w*=(m.tier>=dep.lv?2.5:1.3);
    if(sec==='Hot'&&m.id==='volcanite')w*=3;
    if(sec==='Deep'&&m.tier>=3)w*=2.5;
    if(sec==='Frozen'&&m.id==='glacium')w*=4;
    if(sec==='Ancient'&&m.tier>=3)w*=3;
    if(sec==='Toxic'&&m.id==='sulfurite')w*=2;
    w*=(1+dep.lv*.15);
    return Math.max(0,w);});
  const tW=W.reduce((a,b)=>a+b,0);
  const cW=W.map((_,i)=>W.slice(0,i+1).reduce((a,b)=>a+b,0)/tW);
  const cnt=Math.max(1,2+mb+(sec==='Rich'?2:0)+(sec==='Deep'?1:0));
  const found={};
  for(let i=0;i<cnt;i++){const r=Math.random();const mi=Math.max(0,cW.findIndex(c=>r<=c));
    found[activePool[mi].id]=(found[activePool[mi].id]||0)+1;}
  let chron=false;if(hC&&Math.random()<.2){Object.keys(found).forEach(k=>found[k]*=2);chron=true;}
  if(chron)logs.push({txt:t('mine_chrono'),cls:'lrar'});
  let hasR=false;
  for(const[id,q]of Object.entries(found)){
    const m=[...MINERALS,...MINERALS_4].find(x=>x.id===id);if(!m)continue;
    if(!G.inv[id])G.inv[id]={qty:0,pl:0};
    G.inv[id].qty+=q;G.stats.mined+=q;
    const isR=m.v>=260;if(isR)hasR=true;
    logs.push({txt:`  ${m.sym}  ${m.name.padEnd(14)} Г—${q}  (${m.v*q} CR pot.)`,cls:isR?'lrar':'lok'});}
  if(hasR){sFX('rare');flash('rgba(255,85,255,.13)');}else{sFX('find');flash('rgba(57,255,106,.05)');}

  // HP mod from depth
  if(dep.hpMod<0&&Math.random()<.35){
    let dmg=Math.round(Math.abs(dep.hpMod)*20*(G.era===4?era4dmg:G.planet===3?2.5:G.planet===2?1.8:1));
    if(G.weapon)dmg=Math.max(0,Math.ceil(dmg*G.weapon.dmgMult));
    if(dmg>0){G.hp=Math.max(0,G.hp-dmg);
      logs.push({txt:t('mine_depth_dmg',{n:dep.lv,dmg}),cls:'ldng'});}}

  // Events
  if(Math.random()<.40){
    const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    let hp=ev.hp||0,cr=ev.cr||0;
    if(G.planet===3&&hp<0)hp=Math.ceil(hp*2);
    else if(G.planet===2&&hp<0)hp=Math.ceil(hp*1.5);
    if(hU('biosuit')&&hp<0)hp=Math.ceil(hp*.4);
    if(G.weapon&&hp<0)hp=Math.ceil(hp*G.weapon.dmgMult);
    if(hU('automed')&&hp<0)hp+=8;
    if(ev.hp)G.hp=Math.max(0,Math.min(G.maxHp,G.hp+hp));
    if(ev.cr)G.credits=Math.max(0,G.credits+cr);
    if(ev.mine){const bm=MINERALS.filter(m=>m.tier<=dep.lv+1)[Math.floor(Math.random()*4)];
      G.inv[bm.id].qty+=ev.mine;logs.push({txt:`  вҳ… BONUS: +${ev.mine}Г—${bm.name}`,cls:'lrar'});}
    let es=`вҡЎ ${ev.n}: ${ev.m}`;
    if(hp)es+=`  [HP ${hp>0?'+':''}${hp}]`;if(cr)es+=`  [${cr>0?'+':''}${cr} CR]`;
    logs.push({txt:es,cls:ev.t==='good'?'lok':ev.t==='danger'?'ldng':ev.t==='rare'?'lrar':'lev'});
    G.stats.events++;if(ev.t==='danger'){sFX('danger');flash('rgba(255,58,58,.15)');}}
  G.visited.add(`${(G.turn*3)%13},${(G.turn*2)%13}`);
  _miningLock=false;
  quickSave();
  if(G.hp<=0){setTimeout(sceneOver,700);return;}
  if(G.planet===3&&colonizationMet()){setTimeout(sceneColonizeWin,700);return;}
  rG(logs);}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  SELL
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function aSell(){
  const logs=[];let total=0,any=false;
  const colOresSold=[];
  const sellPool=G.era===4?[...MINERALS,...MINERALS_4]:MINERALS;
  for(const m of sellPool){const s=G.inv[m.id];if(!s||s.qty<=0)continue;any=true;
    if(G.planet===3&&(m.id==='titanium'||m.id==='exoternimium'))colOresSold.push(m.name);
    const mult=s.pl>1?3:s.pl===1?2:1;const val=m.v*mult*s.qty;total+=val;
    const ps=s.pl>0?` [${s.pl>1?'вҳ…вҳ… Г—3':'вҳ… Г—2'}]`:'';
    logs.push({txt:`  ${m.sym} ${m.name.padEnd(14)} Г—${s.qty}${ps}  = ${val} CR`,cls:s.pl>0?'lpol':'lok'});
    G.stats.sold+=val;G.inv[m.id]={qty:0,pl:0};}
  if(!any){rG([{txt:t('sell_empty'),cls:'lwarn'}]);return;}
  if(colOresSold.length)logs.push({txt:t('sell_col_ores_warn',{ores:colOresSold.join(', ')}),cls:'ldng'});
  G.credits+=total;
  logs.push({txt:'',cls:'lwarn'});
  logs.push({txt:t('sell_total',{total,cr:G.credits}),cls:'lok'});
  flash('rgba(57,255,106,.13)');sFX('buy');
  quickSave();
  if(G.era<4&&G.planet===2&&G.credits>=G.goal){setTimeout(sceneCorpOffer,600);return;}
  rG([{txt:t('sell_station'),cls:'linf'},...logs]);}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  SHOP
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function aShop(){
  const cats=['ЕҘaЕҫba','ochrana','prieskum','logistika','ЕЎpeciГЎl'];
  let html='';
  for(const cat of cats){
    const items=UPGRADES.filter(u=>u.cat===cat);if(!items.length)continue;
    html+=`<div style="font-size:.88rem;color:var(--ad);letter-spacing:.09em;margin:.32rem 0 .16rem">[${cat.toUpperCase()}]</div>`;
    for(const u of items){
      const owned=G.upgrades.some(x=>x.id===u.id);const afford=G.credits>=u.cost;
      const isPol=u.id==='polisher'||u.id==='polisher2';
      html+=`<div class="si${owned?' owned':''}" onclick="${owned?'':`shopBuy('${u.id}')`}">
        <span>${owned?'вң“ ':''}<strong style="color:${isPol?'#ffe066':'var(--a)'}">${u.name}</strong>
          <small style="color:var(--ad);margin-left:.4rem">${u.desc}</small></span>
        <span style="font-size:.9rem;color:${owned?'var(--g)':afford?'var(--a)':'var(--r)'}">
          ${owned?t('shop_owned'):u.cost+' CR'}</span></div>`;}  }
  // в”Җв”Җ ERA 4: KolГіniovГ© zГЎsoby в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  if(G.era===4&&G.colony){
    const c=G.colony;
    const supplies=[
      {id:'food50',   label:t('food50'),   cost:800,  act:()=>{c.food=Math.min(200,c.food+50);}},
      {id:'food100',  label:t('food100'),  cost:1500, act:()=>{c.food=Math.min(200,c.food+100);}},
      {id:'energy50', label:t('energy50'), cost:600,  act:()=>{c.energy=Math.min(200,c.energy+50);}},
      {id:'energy100',label:t('energy100'),cost:1100, act:()=>{c.energy=Math.min(200,c.energy+100);}},
      {id:'med30',    label:t('med30'),    cost:900,  act:()=>{c.medicine=Math.min(100,c.medicine+30);}},
      {id:'fuel20',   label:t('fuel20'),   cost:1200, act:()=>{c.fuel=Math.min(100,c.fuel+20);}},
      {id:'recruit1', label:t('recruit'),  cost:2000, act:()=>{if(c.workers<c.housing)c.workers++;else c.housing++;c.workers=Math.min(c.workers,c.housing);}},
      {id:'housing5', label:t('housing5'), cost:3500, act:()=>{c.housing+=5;}},
    ];
    html+=`<div style="font-size:.88rem;color:var(--ad);letter-spacing:.09em;margin:.32rem 0 .16rem">${t('shop_colony_supplies')}</div>`;
    for(const s of supplies){
      const afford=G.credits>=s.cost;
      html+=`<div class="si" onclick="${afford?`buySupply('${s.id}')`:''}" style="${!afford?'opacity:.5':''}">
        <span><strong style="color:#aaeeff">${s.label}</strong></span>
        <span style="font-size:.9rem;color:${afford?'var(--a)':'var(--r)'}">${s.cost} CR</span></div>`;
    }
    // Omega-VII unlock
    if(!G.omegaUnlocked){
      const canOmega=G.rp>=500&&G.credits>=20000;
      html+=`<div class="si" onclick="${canOmega?'buyOmegaUnlock()':''}" style="${!canOmega?'opacity:.5':''}">
        <span><strong style="color:#dd00ff">${t('omega_unlock_btn')}</strong> <small style="color:var(--ad)">500 RP + 20 000 CR</small></span>
        <span style="font-size:.9rem;color:${G.rp>=500?'var(--a)':'var(--r)'}">${G.rp}/500 RP</span></div>`;
    }
  }

  html+=`<div style="font-size:.88rem;color:var(--ad);letter-spacing:.09em;margin:.32rem 0 .16rem">[ZBRANE]</div>`;
  for(const w of WEAPONS){
    const owned=G.weapon&&G.weapon.id===w.id;const afford=G.credits>=w.cost;
    html+=`<div class="si${owned?' owned':''}" onclick="${owned?'':`weaponBuy('${w.id}')`}">
      <span>${owned?'вң“ ':''}<strong style="color:var(--r)">${w.name}</strong>
        <small style="color:var(--ad);margin-left:.4rem">${w.desc}</small></span>
      <span style="font-size:.9rem;color:${owned?'var(--g)':afford?'var(--a)':'var(--r)'}">
        ${owned?t('shop_owned'):w.cost+' CR'}</span></div>`;}
  setScr(`<div class="panel" style="min-width:700px;max-height:92vh;overflow-y:auto;">
    ${corners()}
    <div class="st">${t('shop_title')} вҖ” ${t('shop_upgrades',{n:G.upgrades.length,t:UPGRADES.length})} В· ${G.weapon?'вҡ” '+G.weapon.name:t('shop_no_weapon')} В· ${G.credits} CR</div>
    ${html}
    <div class="mg g1" style="margin-top:.6rem;"><button class="btn bbig" onclick="sFX('click');rG([])">${t('btn_back')}</button></div>
  </div>`);
  document.onkeydown=e=>{if(e.key==='Escape'){sFX('click');rG([]);}};}

function weaponBuy(id){const w=WEAPONS.find(x=>x.id===id);
  if(!w)return;
  if(G.credits<w.cost){sFX('danger');rG([{txt:t('buy_no_cr',{n:w.cost-G.credits}),cls:'ldng'}]);return;}
  G.credits-=w.cost;G.weapon=w;
  sFX('buy');flash('rgba(255,58,58,.17)');
  rG([{txt:t('buy_weapon',{name:w.name,cost:w.cost,cr:G.credits}),cls:'ldng'},
      {txt:`  ${w.desc}`,cls:'linf'}]);}

function buySupply(id){
  if(G.era<4||!G.colony)return;
  const c=G.colony;
  const costs={food50:800,food100:1500,energy50:600,energy100:1100,med30:900,fuel20:1200,recruit1:2000,housing5:3500};
  const cost=costs[id];if(!cost)return;
  if(G.credits<cost){sFX('danger');rG([{txt:t('buy_no_cr',{n:cost-G.credits}),cls:'ldng'}]);return;}
  G.credits-=cost;
  if(id==='food50')c.food=Math.min(200,c.food+50);
  else if(id==='food100')c.food=Math.min(200,c.food+100);
  else if(id==='energy50')c.energy=Math.min(200,c.energy+50);
  else if(id==='energy100')c.energy=Math.min(200,c.energy+100);
  else if(id==='med30')c.medicine=Math.min(100,c.medicine+30);
  else if(id==='fuel20')c.fuel=Math.min(100,c.fuel+20);
  else if(id==='recruit1'){c.housing=Math.max(c.housing,c.workers+1);c.workers++;}
  else if(id==='housing5')c.housing+=5;
  sFX('buy');flash('rgba(170,238,255,.15)');
  aShop();}

function buyOmegaUnlock(){
  if(G.rp<500){sFX('danger');rG([{txt:t('buy_no_rp',{rp:G.rp}),cls:'ldng'}]);return;}
  if(G.credits<20000){sFX('danger');rG([{txt:t('buy_no_cr',{n:20000-G.credits}),cls:'ldng'}]);return;}
  G.rp-=500;G.credits-=20000;G.omegaUnlocked=true;
  sFX('win');flash('rgba(221,0,255,.25)');
  rG([{txt:t('omega_unlocked'),cls:'lrar'},
      {txt:t('omega_cost'),cls:'linf'}]);}

function shopBuy(id){const u=UPGRADES.find(x=>x.id===id);
  if(!u||G.upgrades.some(x=>x.id===id))return;
  if(G.credits<u.cost){sFX('danger');rG([{txt:t('buy_no_cr',{n:u.cost-G.credits}),cls:'ldng'}]);return;}
  G.credits-=u.cost;G.upgrades.push(u);
  if(u.eff==='maxhp+35'){G.maxHp+=35;G.hp=Math.min(G.hp+35,G.maxHp);}
  sFX('buy');flash('rgba(57,255,106,.17)');
  rG([{txt:t('buy_upgrade',{name:u.name,cost:u.cost,cr:G.credits}),cls:'lok'}]);}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  POLISH
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function aPol(){
  const hasN2=hU('polisher2'),maxLv=hasN2?2:1;
  const pCost=(m,lv)=>lv===0?Math.round(m.v*.6):Math.round(m.v*1.8);
  const lbl=[t('pol_raw'),t('pol_polished'),t('pol_nano_done')];const lclr=['var(--ad)','#ffe066','#ff88ff'];
  let html='';
  for(const m of MINERALS){const s=G.inv[m.id]||{qty:0,pl:0};
    const empty=s.qty<=0,atMax=s.pl>=maxLv,cost=empty?0:pCost(m,s.pl),afford=G.credits>=cost;
    const nm=m.v*(s.pl===0?2:3);
    html+=`<div class="pi${empty?' mt0':''}" onclick="${empty||atMax?'':afford?`doPol('${m.id}')`:(`showPolErr(${cost})`)}">
      <span style="display:flex;align-items:center;gap:.45rem">
        <span style="color:${m.col}">${m.sym}</span><strong>${m.name}</strong>
        <span class="pg" style="color:${lclr[s.pl]}">${lbl[s.pl]}</span>
        <span style="color:var(--ad);font-size:.85rem">qty:${s.qty}</span>
      </span>
      <span style="font-size:.88rem">${atMax?`<span style="color:var(--g)">${t('pol_max')}</span>`:empty?`<span style="opacity:.28">${t('pol_empty')}</span>`:
        `<span style="color:${afford?'var(--a)':'var(--r)'}">${cost} CR вҶ’ ${nm} CR/ks</span>`}</span></div>`;}
  setScr(`<div class="panel" style="min-width:720px;max-height:92vh;overflow-y:auto;">
    ${corners()}
    <div class="st">${t('pol_title')}${hasN2?t('pol_nano'):t('pol_basic')}  В· ${G.credits} CR</div>
    <div style="font-size:.85rem;color:var(--ad);margin-bottom:.4rem">${t('pol_hint')}</div>
    ${html}
    <div class="mg g1" style="margin-top:.6rem;"><button class="btn bbig" onclick="sFX('click');rG([])">${t('btn_back')}</button></div>
  </div>`);
  document.onkeydown=e=>{if(e.key==='Escape'){sFX('click');rG([]);}};}

function doPol(id){const m=MINERALS.find(x=>x.id===id);const s=G.inv[id];
  const hasN=hU('polisher2'),maxLv=hasN?2:1;if(s.qty<=0||s.pl>=maxLv)return;
  const cost=s.pl===0?Math.round(m.v*.6):Math.round(m.v*1.8);
  if(G.credits<cost){sFX('danger');return;}
  G.credits-=cost;s.pl++;G.stats.polished++;

function aMap(){
  const GR=13,CS=38,W=GR*CS,H=GR*CS;
  const px=(G.turn*3)%GR,py=(G.turn*2)%GR;
  function sr(x,y){let s=Math.sin(x*127.1+y*311.7)*43758.5453;return s-Math.floor(s);}
  const depColors=['#1a1200','#0d1a0d','#1a0d00','#0a0d1a','#150800','#0a1a14','#0d0d1a','#1a0a1a'];
  const depBorders=['#332200','#1a3300','#331a00','#1a2233','#2a1400','#1a332a','#1a1a33','#331a33'];
  const TL=['ROCK','SOIL','LAVA','ICE','DARK','CAVE','VOID','DEEP'];
  setScr(`<div class="panel" style="text-align:center;min-width:580px;">
    ${corners()}
    <div class="st">${t('map_title')}</div>
    <div style="font-size:.85rem;color:var(--ad);margin-bottom:.3rem">${t('map_visited',{n:G.visited.size,m:G.depthM,t:G.turn})}</div>
    <canvas id="mc" width="${W}" height="${H}" style="border:1px solid var(--ad);"></canvas>
    <div style="font-size:.8rem;color:var(--ad);margin-top:.3rem">${t('map_you')}</div>
    <div class="mg g1" style="margin-top:.5rem;"><button class="btn bbig" onclick="sFX('click');rG([])">${t('btn_back')}</button></div>
  </div>`);
  const mc=document.getElementById('mc'),mctx=mc.getContext('2d');
  for(let y=0;y<GR;y++)for(let x=0;x<GR;x++){
    const ti=Math.floor(sr(x,y)*depColors.length),key=`${x},${y}`;
    mctx.fillStyle=depColors[ti];mctx.fillRect(x*CS,y*CS,CS,CS);
    mctx.strokeStyle=depBorders[ti];mctx.lineWidth=1;mctx.strokeRect(x*CS+.5,y*CS+.5,CS-1,CS-1);
    mctx.font='8px monospace';mctx.fillStyle='#33280a';mctx.fillText(TL[ti],x*CS+3,y*CS+10);
    if(G.visited.has(key)&&!(x===px&&y===py)){
      mctx.fillStyle='rgba(255,140,0,.25)';mctx.fillRect(x*CS+2,y*CS+2,CS-4,CS-4);
      mctx.fillStyle='#ff9900';mctx.font='bold 13px monospace';mctx.fillText('вң“',x*CS+11,y*CS+26);}
    if(x===px&&y===py){
      mctx.fillStyle='rgba(255,220,0,.2)';mctx.fillRect(x*CS+2,y*CS+2,CS-4,CS-4);
      mctx.strokeStyle='#ffee00';mctx.lineWidth=2;mctx.strokeRect(x*CS+2,y*CS+2,CS-4,CS-4);
      mctx.fillStyle='#ffee00';mctx.font='bold 15px monospace';mctx.fillText('в—ү',x*CS+10,y*CS+27);}}
  document.onkeydown=e=>{if(e.key==='Escape'){sFX('click');rG([]);}};}

function doResearch(){
  if(G.credits<50){sFX('danger');rG([{txt:t('research_no_cr'),cls:'ldng'}]);return;}
  G.credits-=50;G.turn++;
  const rp=Math.floor(Math.random()*13)+8;
  const bonus=Math.random()<.10;
  G.rp+=bonus?rp+30:rp;
  const logs=[{txt:t('research_log'),cls:'linf'}];
  if(bonus)logs.push({txt:t('research_breakthrough',{rp:rp+30,total:G.rp}),cls:'lrar'});
  else logs.push({txt:t('research_normal',{rp,total:G.rp}),cls:'lok'});
  sFX('find');flash('rgba(56,209,255,.11)');
  rG(logs);}

function buildRocket(){
  const ROCKET_RP=200,ROCKET_OMEGA=2,ROCKET_VOID=2,ROCKET_CR=8000;
  if(G.rp<ROCKET_RP||G.inv.omegaore.qty<ROCKET_OMEGA||G.inv.voidcrystal.qty<ROCKET_VOID||G.credits<ROCKET_CR)return;
  G.rp-=ROCKET_RP;
  G.inv.omegaore.qty-=ROCKET_OMEGA;G.inv.omegaore.pl=0;
  G.inv.voidcrystal.qty-=ROCKET_VOID;G.inv.voidcrystal.pl=0;
  G.credits-=ROCKET_CR;G.rocket=1;
  sFX('win');flash('rgba(255,136,255,.25)');
  rG([{txt:t('rocket_built'),cls:'lrar'},
      {txt:t('rocket_built_cost'),cls:'linf'}]);}

function aPlanetTravel(){

  let html='';
  for(const p of PLANETS_4){

    const fuelNeed=p.travelCR>0?5:0;
    html+=`<div class="si${isCurrent?' owned':''}${isLocked?' owned':''}" onclick="${isCurrent||isLocked?'':canAfford?`doTravel('${p.id}')`:''}" style="${isLocked?'opacity:.35':''}">

function doTravel(planetId){
  const p=PLANETS_4.find(x=>x.id===planetId);if(!p)return;
  const fuelNeed=p.travelCR>0?5:0;
  if(G.credits<p.travelCR||G.colony.fuel<fuelNeed){
    sFX('danger');rG([{txt:t('travel_no_cr_fuel'),cls:'ldng'}]);return;}
  G.credits-=p.travelCR;G.colony.fuel-=fuelNeed;
  G.currentPlanet4=planetId;G.depth=1;G.depthM=0;
  sFX('depth');flash(p.col+'22');
  rG([{txt:t('travel_flying',{planet:p.name}),cls:'lrar'},
      {txt:t('travel_expenses',{cr:p.travelCR,fuel:fuelNeed}),cls:'lwarn'},
      {txt:`  ${p.desc}`,cls:'linf'}]);}

    <div class="mg" style="max-width:500px;margin:0 auto;">
      <button class="btn bbig" onclick="sFX('click');sceneStory('${pilot}')">${t('new_mission')}</button>
      ${hasSave
        ? `<button class="btn btn-s" style="grid-column:1/-1;text-align:center;font-size:1.2rem;padding:.48rem;" onclick="sFX('click');sceneLoad()">${t('continue_load')}</button>`
        : ''}
      <button class="btn btn-b" style="text-align:center;" onclick="sFX('click');aLead()">${t('leaderboard')}</button>
      <button class="btn" style="text-align:center;" onclick="sFX('click');sceneHowTo()">${t('how_to_play')}</button>
    </div>
  </div>`);
  document.onkeydown=null;
}

function sceneStory(pilot){
  sFX('click');
  const fullText=`KorporГЎcia  в–ә NOVA MINING CORP. в—„  ЕҘa vyslala
na planГ©tu   Z Y R A X - 9  ...

PredchГЎdzajГәca posГЎdka zmizla pred 6 rokmi.
SignГЎl z bane ALPHA-7 ustal bez varovania.
Nikto sa nevrГЎtil. NOVA CORP. to oznaДҚila za
"technickГ© zlyhanie".

Tvoja misia:
  в–ә PristГЎЕҘ na Zyrax-9 a preskГәmaЕҘ baЕҲu ALPHA-7
  в–ә KlesaЕҘ do hДәbky вҖ” 5 ГәrovnГӯ, ДҚГӯm hlbЕЎie tГҪm vzГЎcnejЕЎie
  в–ә VyЕҘaЕҫiЕҘ a predaЕҘ cennГ© nerasty  (11 druhov)
  в–ә InvestovaЕҘ do vybavenia  (15 upgradov)
  в–ә ZakГәpiЕҘ LEЕ TIACE ZARIADENIE pre vyЕЎЕЎГӯ vГҪnos
  в–ә ZozbieraЕҘ  15 000 KREDITOV  a opustiЕҘ planГ©tu
  в–ә P R E ЕҪ I ЕӨ .

SpoloДҚnosЕҘ ti verГӯ.
... alebo aspoЕҲ verГӯ, Еҫe tentokrГЎt sa niekto vrГЎti.`;

  setScr(`<div class="panel" style="min-width:720px;">
    ${corners()}
    <div style="color:var(--ad);font-size:.88rem;letter-spacing:.17em;margin-bottom:.7rem;">${t('story_date')}</div>
    <div id="stxt" style="font-size:1.14rem;line-height:1.82;min-height:240px;white-space:pre-wrap;cursor:pointer;" title="${t('lore_click_hint')}"></div>
    <div id="sbtn" style="margin-top:.7rem;" class="mg g1">
      <button class="btn bbig" onclick="sFX('click');sceneLanding('${pilot}')">${t('landing_enter')}</button>
      <div style="text-align:center;font-size:.85rem;color:var(--ad);margin-top:.3rem">
        ${t('landing_click_hint')}
      </div>
    </div>
  </div>`);

  // Klik na text = okamЕҫite zobraz celГҪ text
  const stxt=document.getElementById('stxt');
  let skipTW=false;
  stxt.addEventListener('click',()=>{
    skipTW=true;
    stxt.textContent=fullText;
  });

  tw(stxt, fullText, 18, ()=>{});
  document.onkeydown=e=>{
    if(e.key==='Enter'||e.key===' ')sceneLanding(pilot);
  };
}

function sceneLanding(pilot){
  sFX('click');
  setScr(`<div class="panel" style="min-width:640px;text-align:center;">
    ${corners()}
    <div style="font-size:.88rem;color:var(--ad);letter-spacing:.17em;margin-bottom:.7rem;">в”Җв”Җ VSTUP DO ATMOSFГүRY  в”Җв”Җ  ZYRAX-9 в”Җв”Җ</div>
    <div id="shipbox" style="font-size:.9rem;line-height:1.32;white-space:pre;color:var(--a);min-height:190px;text-shadow:0 0 10px var(--a);"></div>
    <div id="landmsg" style="font-size:1.08rem;margin-top:.5rem;min-height:1.7rem;"></div>
    <div id="landbtn" style="margin-top:.85rem;display:none;" class="mg g1">
      <button class="btn bbig" onclick="sFX('click');startGameFromScene('${pilot}')">${t('enter_mine_zyrax9')}</button>
    </div>
  </div>`);

  const ship=['      /\\','     /  \\','    / ** \\','   /  **  \\','  /________\\','   |  ||  |','      ||'];
  const frames=[
    {a:'[ 18 000m ]', m:'ZГҒЕҪIH RETRO-RAKETOVГқCH MOTOROV...', c:'#ffb000'},
    {a:'[  9 000m ]', m:'VSTUP DO HUSTEJ ATMOSFГүRY... 1600В°C', c:'#ff6644'},
    {a:'[  2 000m ]', m:'TEPELNГқ Е TГҚT AKTГҚVNY вҖ” STABILIZГҒCIA...', c:'#ffdd44'},
    {a:'[   400m  ]', m:'PRISTГҒVACIE NOHY VYSUNUTГү...', c:'#ffee88'},
    {a:'[  LAND!  ]', m:'вҳ… PRISTГҒTIE ГҡSPEЕ NГү вҳ…  SYSTГүMY: OK', c:'#39ff6a'},
  ];
  let fi=0;
  function nf(){
    if(fi>=frames.length){
      setTimeout(()=>document.getElementById('landbtn').style.display='block',350);
      return;
    }
    const f=frames[fi++];
    const box=document.getElementById('shipbox');
    if(!box)return;
    box.style.color=f.c; box.style.textShadow=`0 0 14px ${f.c}`;
    box.textContent=ship.join('\n')+`\n\n  ${f.a}`;
    const lm=document.getElementById('landmsg');
    if(lm){lm.style.color=f.c; lm.textContent=f.m;}
    flash(f.c+'18');
    if(fi===2) sFX('danger');
    setTimeout(nf, fi===1?700:fi===5?1000:850);
  }
  nf();
  document.onkeydown=null;
}

function startGameFromScene(pilot){
  PILOT=pilot;
  newGame(pilot);
  startAmb();
  showGame([{txt:t('start_log'),cls:'linf'}]);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  LAYOUT (mobile / pc)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function applyLayout(mode){
  localStorage.setItem('kb_layout', mode);
  if(mode==='mobile') document.body.classList.add('kb-mobile');
  else document.body.classList.remove('kb-mobile');
}
(function(){ const l=localStorage.getItem('kb_layout'); if(l) applyLayout(l); })();

function _showLayoutSelect(next){
  rG([`<div style="text-align:center;padding:1.2rem 0">
    <div style="font-size:1.5rem;color:var(--a);letter-spacing:.1em;margin-bottom:1.2rem">
      ${t('layout_title')}
    </div>
    <div style="font-size:1rem;color:var(--ad);margin-bottom:1.6rem">
      ${t('layout_hint')}
    </div>
    <div class="mg g2" style="max-width:420px;margin:0 auto">
      <button class="btn bbig" style="font-size:1.4rem;padding:.9rem;border-color:var(--b);color:var(--b)"
        onclick="applyLayout('mobile');${next}">
        рҹ“ұ<br><span style="font-size:1rem;color:var(--ad)">${t('layout_mobile')}</span>
      </button>
      <button class="btn bbig" style="font-size:1.4rem;padding:.9rem;border-color:var(--a);color:var(--a)"
        onclick="applyLayout('pc');${next}">
        рҹ–ҘпёҸ<br><span style="font-size:1rem;color:var(--ad)">${t('layout_pc')}</span>
      </button>
    </div>
  </div>`]);
}

//  ENTRY POINT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const _params = new URLSearchParams(window.location.search);
let PILOT = _params.get('pilot') || 'PILOT';
const _startSlot = _params.get('slot');   // napr. ?slot=2 = naДҚГӯtaj slot 2

initDesktopData();

if (_startSlot) {
  const _slotNum = parseInt(_startSlot);
  let _loadRetries = 0;
  function _tryLoadSlot() {
    if (loadGame(_slotNum)) {
      startAmb();
      document.getElementById('qsbtn').style.display = 'inline-block';
      document.getElementById('lbbtn').style.display = 'inline-block';
      showGame([{txt:t('game_loaded_slot',{name:G.username}), cls:'linf'}]);
    } else if (_loadRetries++ < 20) {
      setTimeout(_tryLoadSlot, 250); // ДҚakaj na fetch, max 5s
    } else {
      sceneBoot(PILOT);
    }
  }
  setTimeout(_tryLoadSlot, 200);
} else {
  if(!localStorage.getItem('kb_layout')){
    _showLayoutSelect('sceneBoot(PILOT)');
  } else {
    sceneBoot(PILOT);
  }
}
</script>
